x-app-env: &app-env
  env_file: .env.docker

x-app-volumes: &app-volumes
  - ./secrets:/etc/secrets:ro

x-worker: &worker
  build:
    context: .
    dockerfile: Dockerfile
  image: ${APOLLO_IMAGE:-ghcr.io/nickclyde/apollo-backend:latest}
  <<: *app-env
  volumes: *app-volumes
  depends_on:
    pgbouncer:
      condition: service_started
    redis-queue:
      condition: service_healthy
    redis-locks:
      condition: service_healthy
    statsd:
      condition: service_started
    migrate:
      condition: service_completed_successfully
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "pgrep", "apollo"]
    interval: 30s
    timeout: 5s
    retries: 3

services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: apollo
      POSTGRES_PASSWORD: apollo
      POSTGRES_DB: apollo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apollo -d apollo"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      DATABASE_URL: postgres://apollo:apollo@postgres:5432/apollo
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "178"
      MAX_CLIENT_CONN: "4096"
      MIN_POOL_SIZE: "8"
      RESERVE_POOL_TIMEOUT: "1"
      SERVER_RESET_QUERY: DISCARD ALL
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: postgres,apollo
    depends_on:
      postgres:
        condition: service_healthy

  redis-queue:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-locks:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # No-op UDP sink for statsd. The Datadog client crashes if STATSD_URL is
  # unreachable, but it doesn't care what's actually on the other end.
  statsd:
    image: alpine:3.19
    entrypoint: /statsd.sh
    volumes:
      - ./docker/statsd.sh:/statsd.sh:ro
    expose:
      - "8125/udp"

  migrate:
    # Loads docs/schema.sql (matches CI). The step migrations in migrations/
    # have a known bug: 000006 and 000008 both create the same index, so
    # `migrate up` fails on a clean DB. schema.sql is the authoritative
    # consolidated schema.
    image: postgres:14-alpine
    environment:
      PGPASSWORD: apollo
    entrypoint: /migrate.sh
    volumes:
      - ./docs/schema.sql:/schema.sql:ro
      - ./docker/migrate.sh:/migrate.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APOLLO_IMAGE:-ghcr.io/nickclyde/apollo-backend:latest}
    command: ["api"]
    <<: *app-env
    volumes: *app-volumes
    ports:
      - "4000:4000"
    depends_on:
      pgbouncer:
        condition: service_started
      redis-queue:
        condition: service_healthy
      redis-locks:
        condition: service_healthy
      statsd:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/v1/health"]
      interval: 15s
      timeout: 3s
      retries: 5

  scheduler:
    <<: *worker
    command: ["scheduler"]
    container_name: apollo-scheduler

  worker-notifications:
    <<: *worker
    command: ["worker", "--queue", "notifications", "--consumers", "64"]
    container_name: apollo-worker-notifications

  worker-stuck-notifications:
    <<: *worker
    command: ["worker", "--queue", "stuck-notifications", "--consumers", "16"]
    container_name: apollo-worker-stuck-notifications

  worker-subreddits:
    <<: *worker
    command: ["worker", "--queue", "subreddits", "--consumers", "32"]
    container_name: apollo-worker-subreddits

  worker-trending:
    <<: *worker
    command: ["worker", "--queue", "trending", "--consumers", "16"]
    container_name: apollo-worker-trending

  worker-users:
    <<: *worker
    command: ["worker", "--queue", "users", "--consumers", "16"]
    container_name: apollo-worker-users

volumes:
  pgdata:
