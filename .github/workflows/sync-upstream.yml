name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check and Sync Upstream
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REPO: 'Apollo-Reborn/apollo-backend'
        run: |
          # 1. Query upstream's latest release
          LATEST_TAG=$(gh api repos/$UPSTREAM_REPO/releases/latest --jq .tag_name)
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "No release found on upstream repository $UPSTREAM_REPO."
            exit 0
          fi
          echo "Latest upstream release tag: $LATEST_TAG"

          # 2. Check if the tag already exists in our fork
          if git rev-parse "refs/tags/$LATEST_TAG" >/dev/null 2>&1; then
            echo "Tag $LATEST_TAG already exists in the fork. No action needed."
            exit 0
          fi

          echo "New upstream release detected: $LATEST_TAG. Starting sync..."

          # 3. Configure git user
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 4. Add upstream remote
          git remote add upstream "https://github.com/$UPSTREAM_REPO.git" || git remote set-url upstream "https://github.com/$UPSTREAM_REPO.git"

          # 5. Fetch upstream tags and main branch
          git fetch upstream --tags
          git fetch upstream main

          # 6. Ensure we are on main and merge the upstream tag
          git checkout main
          git merge "$LATEST_TAG" -m "Merge upstream release $LATEST_TAG" --no-edit

          # 7. Push changes and the tag to origin
          git push origin main
          git push origin "$LATEST_TAG"
